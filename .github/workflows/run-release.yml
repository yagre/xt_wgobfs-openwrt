name: Create Release on OpenWRT Update

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenWRT version (e.g., 24.10.3)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  sync-releases:
    runs-on: ubuntu-latest
    outputs:
      release_exists: ${{ steps.check_release.outputs.release_exists }}
      release_tag: ${{ steps.get_release.outputs.release_tag }}
      original_tag: ${{ steps.get_release.outputs.original_tag }}
    steps:
      - name: Get the latest release from OpenWRT
        id: get_release
        run: |
          if [ -z "${{ inputs.version }}" ]; then
            RESPONSE=$(curl -sL https://api.github.com/repos/openwrt/openwrt/releases/latest)
            if [ -z "$RESPONSE" ] || [ "$RESPONSE" = "Not Found" ]; then
              echo "Error: Failed to fetch latest release"
              exit 1
            fi
            RELEASE_TAG=$(echo "$RESPONSE" | jq -r .tag_name)
          else
            RELEASE_TAG="v${{ inputs.version }}"
          fi

          echo "original_tag=${RELEASE_TAG}" >> $GITHUB_OUTPUT
          CLEAN_TAG="${RELEASE_TAG#v}"
          echo "release_tag=${CLEAN_TAG}" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: check_release
        run: |
          ORIGINAL_TAG="${{ steps.get_release.outputs.original_tag }}"
          RESPONSE=$(curl -sL -o /dev/null -w "%{http_code}" \
            "https://api.github.com/repos/yagre/xt_wgobfs-openwrt/releases/tags/${ORIGINAL_TAG}")

          if [ "$RESPONSE" = "404" ]; then
            echo "release_exists=false" >> $GITHUB_OUTPUT
            echo "Release does not exist"
          elif [ "$RESPONSE" = "200" ]; then
            echo "release_exists=true" >> $GITHUB_OUTPUT
            echo "Release already exists"
          else
            echo "Error: Unexpected response (HTTP $RESPONSE)"
            echo "release_exists=true" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        if: steps.check_release.outputs.release_exists == 'false'
        run: |
          ORIGINAL_TAG="${{ steps.get_release.outputs.original_tag }}"
          ART="
          \`\`\`
            _______                     ________        __
           |       |.-----.-----.-----.|  |  |  |.----.|  |_
           |   -   ||  _  |  -__|     ||  |  |  ||   _||   _|
           |_______||   __|_____|__|__||________||__|  |____|
                    |__|
          -----------------------------------------------------
          OpenWrt ${ORIGINAL_TAG}
          -----------------------------------------------------
          \`\`\`"

          curl -X POST https://api.github.com/repos/yagre/xt_wgobfs-openwrt/releases \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"${ORIGINAL_TAG}\",
              \"name\": \"Build xt_wgobfs for OpenWrt ${ORIGINAL_TAG}\",
              \"body\": ${ART@Q}
            }"

  run-build:
    needs: sync-releases
    if: needs.sync-releases.outputs.release_exists == 'false'
    uses: ./.github/workflows/build-module.yml
    with:
      tag_name: ${{ needs.sync-releases.outputs.release_tag }}
