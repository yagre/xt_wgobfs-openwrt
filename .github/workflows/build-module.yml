name: Create Release on Tag

on:
  push:
    tags:
      - "v*.*.*"
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenWRT version (e.g., 24.10.3)'
        required: true
        type: string
      targets:
        description: 'Targets (comma-separated, e.g., "stm32,ramips")'
        required: true
        type: string
      subtargets:
        description: 'Subtargets (comma-separated, e.g., "stm32mp1,mt7621")'
        required: true
        type: string

permissions:
  contents: write

jobs:
  generate-config:
    runs-on: ubuntu-latest
    outputs:
      job-config: ${{ steps.generate-config.outputs.job-config }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.16.0'

      - name: Get OpenWRT version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
            echo "TARGETS=${{ inputs.targets }}" >> $GITHUB_ENV
            echo "SUBTARGETS=${{ inputs.subtargets }}" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" == "workflow_call" ]; then
            VERSION="${{ inputs.tag_name }}"
            echo "VERSION=${VERSION#v}" >> $GITHUB_ENV
          else
            TAG="${GITHUB_REF#refs/tags/}"
            echo "VERSION=${TAG#v}" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: npm install

      - name: Generate Job Config
        id: generate-config
        run: node index.js ${{ env.VERSION }} "${{ env.TARGETS }}" "${{ env.SUBTARGETS }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: "v${{ matrix.build_env.tag }} - ${{ matrix.build_env.pkgarch}} :: ${{ matrix.build_env.target}}/${{ matrix.build_env.subtarget}} build"
    runs-on: ubuntu-latest
    needs: generate-config
    strategy:
      matrix:
        build_env: ${{ fromJson(needs.generate-config.outputs.job-config) }}
      fail-fast: false

    steps:
      - name: Checkout xt_wgobfs source code
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyelftools

      - name: Download and extract OpenWrt SDK
        run: |
          MIRRORS=(
            "https://mirror-03.infra.openwrt.org"
            "https://downloads.openwrt.org"
            "https://archive.openwrt.org"
          )

          for MIRROR in "${MIRRORS[@]}"; do
            echo "Trying mirror: $MIRROR"
            URL="$MIRROR/releases/${{ matrix.build_env.tag }}/targets/${{ matrix.build_env.target}}/${{ matrix.build_env.subtarget}}/"
            SDK_FILE=$(curl -s "$URL" | grep -o "openwrt-sdk-${{ matrix.build_env.tag }}-${{ matrix.build_env.target}}-${{ matrix.build_env.subtarget}}_gcc-[^\"]*_musl[^\"]*\.Linux-x86_64\.tar\.[xz|zst]*" | head -n1)

            if [ -n "$SDK_FILE" ]; then
              SDK_DOWNLOAD_URL="${URL}${SDK_FILE}"
              echo "Downloading SDK: $SDK_DOWNLOAD_URL"
              if wget -q "$SDK_DOWNLOAD_URL"; then
                if [[ "$SDK_FILE" == *.tar.zst ]]; then tar --zstd -xf "$SDK_FILE"; else tar -xf "$SDK_FILE"; fi
                rm "$SDK_FILE"
                break
              fi
            fi
          done

          if [ ! -d "openwrt-sdk-"* ]; then echo "SDK download failed"; exit 1; fi

      - name: Setup SDK and feeds
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)
          cd "$SDK_DIR"
          sed -i 's|src-git-full|src-git|g' feeds.conf.default

          update_feeds_robust() {
            local attempt=1
            while [ $attempt -le 3 ]; do
              echo "Attempt $attempt..."
              if [ $attempt -eq 2 ]; then
                sed -i 's|https://git.openwrt.org/|https://github.com/openwrt/|g' feeds.conf.default
              fi
              if ./scripts/feeds update base packages; then return 0; fi
              sleep $((attempt * 10)); attempt=$((attempt + 1))
            done
            return 1
          }

          update_feeds_robust || exit 1
          ./scripts/feeds install xtables-addons
          
          git clone https://github.com/infinet/xt_wgobfs.git package/xt_wgobfs
          mkdir -p ./package/feeds/packages/xtables-wgobfs
          cp ./package/xt_wgobfs/openwrt/package/Makefile ./package/feeds/packages/xtables-wgobfs/
          make defconfig

      - name: Build xt_wgobfs packages
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)
          make -C "$SDK_DIR" package/xtables-wgobfs/compile -j$(nproc)
          find "$SDK_DIR/bin" -type f \( -name "*wgobfs*.ipk" -o -name "*wgobfs*.apk" \)

      - name: Prepare artifacts
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)
          mkdir -p wgobfsrelease
          find "$SDK_DIR/bin" -type f \( -name "*wgobfs*.ipk" -o -name "*wgobfs*.apk" \) | while read -r file; do
            ext="${file##*.}"
            base=$(basename "$file" ".$ext")
            cp "$file" "wgobfsrelease/${base}_v${{ matrix.build_env.tag }}_${{ matrix.build_env.pkgarch}}.${ext}"
          done

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: wgobfsrelease/*
          tag_name: v${{ matrix.build_env.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
