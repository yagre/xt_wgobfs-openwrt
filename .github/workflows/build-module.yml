name: Create Release on Tag

on:
  push:
    tags:
      - "v*.*.*"
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenWRT version (e.g., 24.10.3)'
        required: false
        type: string
      targets:
        description: 'Targets (comma-separated, e.g., "stm32,ramips")'
        required: false
        type: string
      subtargets:
        description: 'Subtargets (comma-separated, e.g., "stm32mp1,mt7621")'
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate-config:
    runs-on: ubuntu-latest
    outputs:
      job-config: ${{ steps.generate-config.outputs.job-config }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.16.0'

      - name: Get OpenWRT version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
            echo "TARGETS=${{ inputs.targets }}" >> $GITHUB_ENV
            echo "SUBTARGETS=${{ inputs.subtargets }}" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" == "workflow_call" ]; then
            VERSION="${{ inputs.tag_name }}"
            echo "VERSION=${VERSION#v}" >> $GITHUB_ENV
          else
            TAG="${GITHUB_REF#refs/tags/}"
            echo "VERSION=${TAG#v}" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: npm install

      - name: Generate Job Config
        id: generate-config
        run: node index.js ${{ env.VERSION }} "${{ env.TARGETS }}" "${{ env.SUBTARGETS }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: "v${{ matrix.build_env.tag }} - ${{ matrix.build_env.pkgarch}} :: ${{ matrix.build_env.target}}/${{ matrix.build_env.subtarget}} build"
    runs-on: ubuntu-latest
    needs: generate-config
    strategy:
      matrix:
        build_env: ${{ fromJson(needs.generate-config.outputs.job-config) }}
      fail-fast: false

    steps:
      - name: Checkout xt_wgobfs source code
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyelftools

      - name: Download and extract OpenWrt SDK
        run: |
          MIRRORS=(
            "https://mirror-03.infra.openwrt.org"
            "https://downloads.openwrt.org"
            "https://archive.openwrt.org"
          )

          for MIRROR in "${MIRRORS[@]}"; do
            echo "Trying mirror: $MIRROR"
            URL="$MIRROR/releases/${{ matrix.build_env.tag }}/targets/${{ matrix.build_env.target}}/${{ matrix.build_env.subtarget}}/"
            SDK_FILE=$(curl -s "$URL" | grep -o "openwrt-sdk-${{ matrix.build_env.tag }}-${{ matrix.build_env.target}}-${{ matrix.build_env.subtarget}}_gcc-[^\"]*_musl[^\"]*\.Linux-x86_64\.tar\.[xz|zst]*" | head -n1)

            if [ -n "$SDK_FILE" ]; then
              SDK_DOWNLOAD_URL="${URL}${SDK_FILE}"
              echo "Downloading SDK: $SDK_DOWNLOAD_URL"
              if wget -q "$SDK_DOWNLOAD_URL"; then
                # Extract to /dev/shm (RAM) for faster I/O
                if [[ "$SDK_FILE" == *.tar.zst ]]; then
                  tar --zstd -xf "$SDK_FILE" -C /dev/shm/
                else
                  tar -xf "$SDK_FILE" -C /dev/shm/
                fi
                rm "$SDK_FILE"

                # Create symlink in workspace
                SDK_DIR_NAME=$(find /dev/shm -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1 | xargs basename)
                ln -s /dev/shm/$SDK_DIR_NAME ./$SDK_DIR_NAME
                echo "SDK extracted to /dev/shm/$SDK_DIR_NAME"
                break
              fi
            fi
          done

          if [ ! -d "openwrt-sdk-"* ]; then
            echo "SDK download failed"
            exit 1
          fi

      - name: Setup SDK and feeds
        run: |
          SDK_DIR=$(find . -maxdepth 1 \( -type d -o -type l \) -name "openwrt-sdk-*" | head -n1)
          if [ -z "$SDK_DIR" ]; then
            echo "SDK directory not found"
            exit 1
          fi
          cd "$SDK_DIR"
          
          # Clean old traces
          rm -rf package/xt_wgobfs
          
          # 1. Update feeds (base needed for kernel headers)
          ./scripts/feeds update -q base
          ./scripts/feeds install -q kmod-ipt-core libxtables
          
          # 2. Clone sources to temp folder OUTSIDE SDK
          git clone --depth 1 https://github.com/infinet/xt_wgobfs.git /tmp/xt_wgobfs
          
          # 3. Create ONE clean package folder
          mkdir -p package/xt_wgobfs
          
          # Copy Makefile
          cp /tmp/xt_wgobfs/openwrt/package/Makefile package/xt_wgobfs/Makefile
          
          # Remove recursive dependency (fixes "recursive dependency" error)
          sed -i 's/+kmod-ipt-wgobfs//g' package/xt_wgobfs/Makefile
          
          # 4. Copy src folder inside so Makefile can find it
          cp -r /tmp/xt_wgobfs/src package/xt_wgobfs/
          
          # Generate config
          make defconfig

      - name: Build xt_wgobfs packages
        run: |
          SDK_DIR=$(find . -maxdepth 1 \( -type d -o -type l \) -name "openwrt-sdk-*" | head -n1)
          if [ -z "$SDK_DIR" ]; then
            echo "SDK directory not found"
            exit 1
          fi
          # Build with verbose output to see the actual error
          make -C "$SDK_DIR" package/xt_wgobfs/compile -j1 V=s
          find "$SDK_DIR/bin" -type f \( -name "*wgobfs*.ipk" -o -name "*wgobfs*.apk" \)

      - name: Prepare artifacts
        run: |
          SDK_DIR=$(find . -maxdepth 1 \( -type d -o -type l \) -name "openwrt-sdk-*" | head -n1)
          if [ -z "$SDK_DIR" ]; then
            echo "SDK directory not found"
            exit 1
          fi
          mkdir -p wgobfsrelease
          find "$SDK_DIR/bin" -type f \( -name "*wgobfs*.ipk" -o -name "*wgobfs*.apk" \) | while read -r file; do
            filename=$(basename "$file")
            ext="${filename##*.}"
            # Extract package name (iptables-mod-wgobfs or kmod-ipt-wgobfs)
            pkgname=$(echo "$filename" | sed 's/-[0-9].*$//' | sed 's/_.*$//')
            cp "$file" "wgobfsrelease/${pkgname}_v${{ matrix.build_env.tag }}_${{ matrix.build_env.pkgarch }}_${{ matrix.build_env.target }}_${{ matrix.build_env.subtarget }}.${ext}"
          done

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: wgobfsrelease/*
          tag_name: v${{ matrix.build_env.tag }}
          body: |
            ```
              _______                     ________        __
             |       |.-----.-----.-----.|  |  |  |.----.|  |_
             |   -   ||  _  |  -__|     ||  |  |  ||   _||   _|
             |_______||   __|_____|__|__||________||__|  |____|
                      |__|
            -----------------------------------------------------
            OpenWrt v${{ matrix.build_env.tag }}
            -----------------------------------------------------

            Target: ${{ matrix.build_env.target }}/${{ matrix.build_env.subtarget }}
            Architecture: ${{ matrix.build_env.pkgarch }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
